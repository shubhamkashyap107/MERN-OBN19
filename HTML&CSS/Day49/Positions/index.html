<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <h1>CSS Positions</h1>


    <div id="parent">
        <div style="background-color: red;" class="child">A</div>
        <div id="static-child" style="background-color: yellow;" class="child">B</div>
        <div style="background-color: green;" class="child">C</div>
    </div>


     <div id="parent">
        <div style="background-color: red;" class="child">A</div>
        <div id="relative-child" style="background-color: yellow;" class="child">B</div>
        <div style="background-color: green;" class="child">C</div>
    </div>


     <div style="position: relative;" id="parent">
        <div style="background-color: red;" class="child">A</div>
        <div id="absolute-child" style="background-color: yellow;" class="child">B</div>
        <div style="background-color: green;" class="child">C</div>
    </div>


     <div id="parent">
        <div style="background-color: red;" class="child">A</div>
        <div id="fixed-special" style="background-color: yellow;" class="child">B</div>
        <div style="background-color: green;" class="child">C</div>
    </div>




    <div style="height: 500px; width: 200vw;" id="parent">
        <div style="background-color: red;" class="child">A</div>
        <div id="sticky-special" style="background-color: yellow;" class="child">B</div>
        <div style="background-color: green;" class="child">C</div>
    </div>

    <hr>
    <p>Lorem ipsum dolor <br> sit amet consectetur.</p>

       

</body>
</html>
