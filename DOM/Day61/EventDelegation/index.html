<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #box{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
        }

        .card{
            background-color: lightblue;
            height: 30vh;
        }

        #cart{
            height: 20vh;
            width: 50vw;
            border: 5px solid black;
            margin-top: 50px;
        }
    </style>

</head>
<body>

    <main id="box">
        <article class="card">Milk</article>
        <article class="card">Chaach</article>
        <article class="card">Paneer</article>
        <article class="card">Dahi</article>
        <article class="card">Tamatar</article>
        <article class="card">Alu</article>
        <article class="card">Bhindi</article>
        <article class="card">Ghee</article>
    </main>

    <footer id="cart">

    </footer>



    <script src="./app.js"></script>
    
</body>
</html>
