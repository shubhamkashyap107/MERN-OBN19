<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 >Task Manager</h1>

    <div id="ip-parent">
        <input id="ip" type="text">
        <button id="btn">Add Task</button>
    </div>

    <div id="parent">
        <section class="boxes">
            <h1>Pending</h1>
            <div class="abc" id="pending-cards-container">

            </div>
        </section>
        <section class="boxes">
            <h1>In Progress</h1>
            <div class="abc" id="progress-cards-container">

            </div>
        </section>
        <section class="boxes">
            <h1>Completed</h1>
            <div class="abc" id="completed-cards-container">

            </div>
        </section>
    </div>



    <script src="./app.js"></script>
</body>
</html>
